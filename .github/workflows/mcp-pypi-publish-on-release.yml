name: "MCP: Publish Python Package"

on:
  release:
    types:
      - published

jobs:
  call-test-lint:
    if: startsWith(github.event.release.tag_name, 'mcp/v')
    uses: ./.github/workflows/mcp-test-lint.yml
    permissions:
      contents: read
    with:
      ref: ${{ github.event.release.target_commitish }}

  build:
    name: Build distribution
    if: startsWith(github.event.release.tag_name, 'mcp/v')
    permissions:
      contents: read
    needs:
      - call-test-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: strands-mcp

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatch twine
      - name: Validate version
        run: |
          version=$(hatch version)
          if [[ $version =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Valid version format"
              exit 0
          else
              echo "Invalid version format"
              exit 1
          fi
      - name: Build
        run: |
          hatch build
      - name: Store the distribution packages
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: strands-mcp/dist/

  deploy:
    name: Upload release to PyPI
    needs:
      - build
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/strands-agents-mcp-server
    permissions:
      id-token: write

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
